<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Arkanoid Pro</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a1a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  min-height: 100vh;
  font-family: system-ui, sans-serif;
  color: #fff;
  touch-action: none;
}

h1 { font-size: 24px; color: #60a5fa; margin: 12px 0; }

#hud {
  display: flex;
  gap: 24px;
  margin-bottom: 8px;
  font-size: 14px;
  font-weight: 500;
  color: #a0c4ff;
}
#hud span { color: #fff; }

canvas {
  border: 2px solid #334;
  display: block;
  max-width: 100%;
}

#msg {
  margin-top: 12px;
  font-size: 20px;
  font-weight: 500;
  color: #fff;
  min-height: 28px;
  text-align: center;
}

#start-btn {
  margin-top: 10px;
  padding: 8px 28px;
  background: #2563eb;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  cursor: pointer;
}
#start-btn:hover { background: #1d4ed8; }

/* BOTÓN ÚNICO GO/FIRE */
#launch-btn {
  position: fixed;
  bottom: 22px;
  left: 50%;
  transform: translateX(-50%);
  background: #22c55e;
  color: #fff;
  border: none;
  border-radius: 50%;
  width: 80px;
  height: 80px;
  font-size: 22px;
  font-weight: bold;
  display: none;
  justify-content: center;
  align-items: center;
  box-shadow: 0 0 12px #000;
}

#sound-btn {
  position: fixed;
  top: 10px;
  right: 10px;
  background: #1e293b;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 18px;
  cursor: pointer;
  box-shadow: 0 0 8px #000;
}
#sound-btn:hover { background: #334155; }
</style>
</head>

<body>

<h1>Arkanoid Pro</h1>

<div id="hud">
  Puntos: <span id="score">0</span>
  Nivel: <span id="level">1</span>
  Vidas: <span id="lives">3</span>
</div>

<canvas id="c" width="420" height="480"></canvas>

<div id="msg">Pulsa INICIO para jugar</div>
<button id="start-btn">INICIO</button>

<button id="launch-btn">GO</button>
<button id="sound-btn">🔊</button>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 420, H = 480;

const LEVELS = [
  { rows: 4, cols: 10, colors: ['#ef4444','#f97316','#eab308','#22c55e'] },
  { rows: 5, cols: 10, colors: ['#3b82f6','#8b5cf6','#ec4899','#06b6d4','#f59e0b'] },
  { rows: 6, cols: 10, colors: ['#e11d48','#7c3aed','#0369a1','#15803d','#b45309','#dc2626'] }
];

let bricks=[], ball={}, paddle={}, score=0, lives=3, level=0, running=false, raf=null;
const BW=36, BH=14, BPAD=2, BOFFX=9, BOFFY=40;
const PW_BASE=70, PH=10, PSPEED=6, BR=7;

let powerups = [];
let bullets = [];
let stickyMode = false;
let laserMode = false;
let soundEnabled = true;

let boss = null;
let bossProjectiles = [];

/* VIBRACIÓN */
function vibra(ms=50){
  if(navigator.vibrate) navigator.vibrate(ms);
}

/* MÚSICA ARCADE */
let musicOsc=null, musicGain=null;
function startMusic(){
  if(!soundEnabled) return;
  if(!audioCtx) initAudio();

  musicOsc = audioCtx.createOscillator();
  musicGain = audioCtx.createGain();

  musicOsc.type = "square";
  musicOsc.frequency.value = 180;
  musicGain.gain.value = 0.05;

  musicOsc.connect(musicGain);
  musicGain.connect(audioCtx.destination);
  musicOsc.start();

  let t=0;
  setInterval(()=>{
    if(!musicOsc) return;
    musicOsc.frequency.value = 180 + Math.sin(t)*20;
    t += 0.2;
  },120);
}

function stopMusic(){
  if(musicOsc){
    musicOsc.stop();
    musicOsc.disconnect();
    musicOsc=null;
  }
}

/* SONIDO */
let audioCtx=null;
function initAudio(){ if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }
function arcade(freq,duration=0.08,type='square'){
  if(!soundEnabled) return;
  initAudio();
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.type=type; o.frequency.value=freq; g.gain.value=0.25;
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime+duration);
}
function sndBounce(){arcade(600,0.06,'square');}
function sndBrick(){arcade(800,0.07,'square');}
function sndExplode(){arcade(200,0.25,'sawtooth');}
function sndPower(){arcade(900,0.12,'triangle');}
function sndLaser(){arcade(1200,0.05,'square');}
function sndSticky(){arcade(500,0.10,'triangle');}
function sndWin(){arcade(900,0.20,'square');}
function sndGameOver(){arcade(250,0.30,'sawtooth');}
function playSound(f){f();}

function updateLaunchButton(){
  const btn = document.getElementById("launch-btn");

  if(ball.stuck){
    btn.textContent = "GO";
    btn.style.background = "#22c55e";
    btn.style.display = "flex";
  }
  else if(laserMode){
    btn.textContent = "FIRE";
    btn.style.background = "#ef4444";
    btn.style.display = "flex";
  }
  else{
    btn.style.display = "none";
  }
}

function randomBrickType(){
  const r=Math.random();
  if(r<0.10) return "hard";
  if(r<0.15) return "explosive";
  if(r<0.20) return "invisible";
  return "normal";
}

function initLevel(lv){
  let L;
  if(lv<LEVELS.length){
    L=LEVELS[lv];
  } else {
    const extra=lv-LEVELS.length+1;
    L={
      rows:4+Math.floor(extra/2),
      cols:8+Math.floor(extra/3),
      colors:['#ef4444','#f97316','#eab308','#22c55e','#3b82f6','#8b5cf6']
    };
  }

  bricks=[];
  powerups=[];
  bullets=[];
  boss=null;
  bossProjectiles=[];
  stickyMode=false;
  laserMode=false;

  for(let r=0;r<L.rows;r++){
    for(let c=0;c<L.cols;c++){
      const type=randomBrickType();
      bricks.push({
        x:BOFFX+c*(BW+BPAD),
        y:BOFFY+r*(BH+BPAD),
        alive:true,
        color:L.colors[r%L.colors.length],
        type:type,
        hits:type==="hard"?2:1,
        visible:type!=="invisible"
      });
    }
  }

  paddle={x:W/2-PW_BASE/2,y:H-30,w:PW_BASE,h:PH,dx:0};
  ball={x:W/2,y:H-50,r:BR,dx:3.5+lv*0.4,dy:-(3.5+lv*0.4),stuck:true};

  updateLaunchButton();

  if((lv+1)%5===0){
    spawnBoss(lv);
    document.getElementById('msg').textContent = "¡JEFE!";
    vibra(120);
  } else {
    document.getElementById('msg').textContent = "¡Nivel " + (lv+1) + "!";
    vibra(80);
  }

  setTimeout(()=>{ if(running) document.getElementById('msg').textContent=""; },1500);
}

function spawnBoss(level){
  boss={x:W/2-60,y:60,w:120,h:40,dx:2+level*0.2,life:20+level*5};
  bossProjectiles=[];
}

function draw(){
  ctx.fillStyle='#0a0a1a';
  ctx.fillRect(0,0,W,H);

  bricks.forEach(b=>{
    if(!b.alive||!b.visible) return;
    ctx.fillStyle=b.type==="hard"?"#fff":b.type==="explosive"?"#ff00ff":b.color;
    ctx.beginPath();

    if(b.type==="normal"){
      ctx.roundRect(b.x,b.y,BW,BH,3);
    } else if(b.type==="hard"){
      const cx=b.x+BW/2, cy=b.y+BH/2, r=BH/1.2;
      for(let i=0;i<6;i++){
        const a=Math.PI/3*i;
        const px=cx+r*Math.cos(a), py=cy+r*Math.sin(a);
        if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.closePath();
    } else if(b.type==="explosive"){
      ctx.moveTo(b.x+BW/2,b.y);
      ctx.lineTo(b.x+BW,b.y+BH/2);
      ctx.lineTo(b.x+BW/2,b.y+BH);
      ctx.lineTo(b.x,b.y+BH/2);
      ctx.closePath();
    } else if(b.type==="invisible"){
      const cx=b.x+BW/2, cy=b.y+BH/2;
      ctx.arc(cx,cy,BH/2,0,Math.PI*2);
    }

    ctx.fill();
  });

  ctx.fillStyle=laserMode?"#f87171":"#60a5fa";
  ctx.beginPath();
  ctx.roundRect(paddle.x,paddle.y,paddle.w,paddle.h,5);
  ctx.fill();

  if(laserMode){
    ctx.fillStyle="#ef4444";
    ctx.fillRect(paddle.x+5,paddle.y-10,10,10);
    ctx.fillRect(paddle.x+paddle.w-15,paddle.y-10,10,10);
  }

  ctx.fillStyle=stickyMode?"#22c55e":"#fff";
  ctx.beginPath();
  ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
  ctx.fill();

  powerups.forEach(p=>{
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.roundRect(p.x,p.y,p.w,p.h,4);
    ctx.fill();
    ctx.fillStyle='#000';
    ctx.font='10px system-ui';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(p.label,p.x+p.w/2,p.y+p.h/2);
  });

  bullets.forEach(b=>{
    ctx.fillStyle="#ff0000";
    ctx.fillRect(b.x-2,b.y-10,4,10);
  });

  if(boss){
    ctx.fillStyle="#ff4444";
    ctx.beginPath();
    ctx.roundRect(boss.x,boss.y,boss.w,boss.h,8);
    ctx.fill();

    ctx.fillStyle="#fff";
    ctx.fillRect(boss.x,boss.y-10,boss.w,4);
    ctx.fillStyle="#22c55e";
    ctx.fillRect(boss.x,boss.y-10,boss.w*(boss.life/(20+level*5)),4);
  }

  bossProjectiles.forEach(p=>{
    ctx.fillStyle="#ff0000";
    ctx.fillRect(p.x-3,p.y,6,12);
  });
}




function explodeBrick(b){
  bricks.forEach(nb=>{
    if(!nb.alive) return;
    const dx=Math.abs(nb.x-b.x), dy=Math.abs(nb.y-b.y);
    if(dx<BW*1.5 && dy<BH*1.5) nb.alive=false;
  });
  playSound(sndExplode);
}

function spawnPowerup(x,y){
  if(Math.random()>0.25) return;
  const types=[
    { type:'PADDLE_BIG', color:'#22c55e', label:'P' },
    { type:'BALL_SLOW',  color:'#3b82f6', label:'S' },
    { type:'LIFE_UP',    color:'#f97316', label:'L' },
    { type:'LASER',      color:'#ef4444', label:'🔫' },
    { type:'STICKY',     color:'#22c55e', label:'🧲' }
  ];
  const t=types[Math.floor(Math.random()*types.length)];
  powerups.push({
    x:x+BW/2-10,
    y:y,
    w:22,
    h:14,
    dy:2,
    type:t.type,
    color:t.color,
    label:t.label
  });
}

function applyPowerup(p){
  playSound(sndPower);

  if(p.type==='LASER'){
    stickyMode=false;
    laserMode=true;
  }
  else if(p.type==='STICKY'){
    laserMode=false;
    stickyMode=true;
    playSound(sndSticky);
  }
  else if(p.type==='PADDLE_BIG'){
    paddle.w=Math.min(paddle.w+25,140);
  }
  else if(p.type==='BALL_SLOW'){
    ball.dx*=0.7;
    ball.dy*=0.7;
  }
  else if(p.type==='LIFE_UP'){
    lives++;
    document.getElementById('lives').textContent=lives;
  }

  updateLaunchButton();
}

function fireLaser(){
  if(!laserMode) return;
  bullets.push({x:paddle.x+10,y:paddle.y-10});
  bullets.push({x:paddle.x+paddle.w-10,y:paddle.y-10});
  playSound(sndLaser);
}

function releaseBall(){
  if(!ball.stuck) return;
  ball.stuck=false;
  ball.dy=-Math.abs(ball.dy);
  playSound(sndSticky);
  updateLaunchButton();
}

function endGame(win){
  running=false;
  cancelAnimationFrame(raf);
  document.getElementById('start-btn').style.display='block';
  document.getElementById('msg').textContent = win ? '¡Has ganado!' : 'Game Over';
  playSound(win?sndWin:sndGameOver);
  vibra(200);
  stopMusic();
}

function update(){

  if(!ball.stuck){
    ball.x+=ball.dx;
    ball.y+=ball.dy;
  } else {
    ball.x=paddle.x+paddle.w/2;
    ball.y=paddle.y-ball.r-1;
  }

  if(ball.x-ball.r<0){ball.x=ball.r;ball.dx=Math.abs(ball.dx);playSound(sndBounce);}
  if(ball.x+ball.r>W){ball.x=W-ball.r;ball.dx=-Math.abs(ball.dx);playSound(sndBounce);}
  if(ball.y-ball.r<0){ball.y=ball.r;ball.dy=Math.abs(ball.dy);playSound(sndBounce);}

  if(ball.x>paddle.x && ball.x<paddle.x+paddle.w &&
     ball.y+ball.r>=paddle.y && ball.y+ball.r<=paddle.y+paddle.h+5 && ball.dy>0){

    if(stickyMode){
      ball.stuck=true;
      playSound(sndSticky);
      updateLaunchButton();
    } else {
      let hit=(ball.x-(paddle.x+paddle.w/2))/(paddle.w/2);
      ball.dx=hit*5;
      ball.dy=-Math.abs(ball.dy);
      ball.y=paddle.y-ball.r-1;
      playSound(sndBounce);
    }
  }

  if(ball.y-ball.r>H){
    lives--;
    document.getElementById('lives').textContent=lives;

    if(lives<=0){ endGame(false); return; }

    ball.x=W/2;
    ball.y=H-50;
    ball.dx=3.5+level*0.4;
    ball.dy=-(3.5+level*0.4);
    ball.stuck=true;
    stickyMode=false;
    laserMode=false;
    updateLaunchButton();
    vibra(120);
  }

  bricks.forEach(b=>{
    if(!b.alive) return;

    if(ball.x+ball.r>b.x && ball.x-ball.r<b.x+BW &&
       ball.y+ball.r>b.y && ball.y-ball.r<b.y+BH){

      if(b.type==="invisible") b.visible=true;

      b.hits--;
      if(b.hits<=0){
        b.alive=false;
        if(b.type==="explosive") explodeBrick(b);
        score+=10*(level+1);
        document.getElementById('score').textContent=score;
        spawnPowerup(b.x,b.y);
        playSound(sndBrick);
      }

      const fromLeft=ball.x<b.x;
      const fromRight=ball.x>b.x+BW;
      if(fromLeft||fromRight) ball.dx*=-1;
      else ball.dy*=-1;
    }
  });

  if(boss){
    boss.x+=boss.dx;
    if(boss.x<0||boss.x+boss.w>W) boss.dx*=-1;

    if(Math.random()<0.02){
      bossProjectiles.push({x:boss.x+boss.w/2,y:boss.y+boss.h,dy:4});
    }

    if(ball.x>boss.x && ball.x<boss.x+boss.w &&
       ball.y>boss.y && ball.y<boss.y+boss.h){

      boss.life--;
      ball.dy*=-1;
      playSound(sndExplode);

      if(boss.life<=0){
        boss=null;
        bossProjectiles=[];
        document.getElementById('msg').textContent="¡JEFE DERROTADO!";
        vibra(150);
        setTimeout(()=>document.getElementById('msg').textContent="",1500);
      }
    }
  }

  bossProjectiles=bossProjectiles.filter(p=>{
    p.y+=p.dy;
    if(p.y>H) return false;

    if(p.x>paddle.x && p.x<paddle.x+paddle.w &&
       p.y>paddle.y && p.y<paddle.y+paddle.h){

      lives--;
      document.getElementById('lives').textContent=lives;

      if(lives<=0){ endGame(false); return false; }

      ball.stuck=true;
      updateLaunchButton();
      vibra(120);
      return false;
    }
    return true;
  });

  powerups.forEach(p=>p.y+=p.dy);
  powerups=powerups.filter(p=>{
    if(p.y>H) return false;
    if(p.x+p.w>paddle.x && p.x<paddle.x+paddle.w &&
       p.y+p.h>paddle.y && p.y<paddle.y+paddle.h){
      applyPowerup(p);
      return false;
    }
    return true;
  });

  paddle.x+=paddle.dx;
  if(paddle.x<0) paddle.x=0;
  if(paddle.x+paddle.w>W) paddle.x=W-paddle.w;

  bullets.forEach(b=>b.y-=8);
  bullets=bullets.filter(b=>{
    if(b.y<0) return false;

    for(let brick of bricks){
      if(!brick.alive) continue;

      if(b.x>brick.x && b.x<brick.x+BW &&
         b.y>brick.y && b.y<brick.y+BH){

        brick.hits--;
        if(brick.hits<=0){
          brick.alive=false;
          if(brick.type==="explosive") explodeBrick(brick);
          score+=10*(level+1);
          document.getElementById('score').textContent=score;
          spawnPowerup(brick.x,brick.y);
        }

        playSound(sndLaser);
        return false;
      }
    }
    return true;
  });

  if(bricks.every(b=>!b.alive) && !boss){
    level++;
    document.getElementById('level').textContent=level+1;
    initLevel(level);
    vibra(80);
  }
}

function loop(){
  update();
  draw();
  if(running) raf=requestAnimationFrame(loop);
}

document.getElementById('start-btn').addEventListener('click',()=>{
  score=0; lives=3; level=0;
  document.getElementById('score').textContent=0;
  document.getElementById('level').textContent=1;
  document.getElementById('lives').textContent=3;
  document.getElementById('msg').textContent='';
  document.getElementById('start-btn').style.display='none';

  initLevel(0);
  running=true;
  startMusic();
  raf=requestAnimationFrame(loop);
});

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft') paddle.dx=-PSPEED;
  if(e.key==='ArrowRight') paddle.dx=PSPEED;
  if(e.key===' '){
    if(ball.stuck) releaseBall();
    else if(laserMode) fireLaser();
  }
});
document.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft'||e.key==='ArrowRight') paddle.dx=0;
});

canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  const scaleX=W/rect.width;
  paddle.x=(e.clientX-rect.left)*scaleX-paddle.w/2;
});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  const scaleX=W/rect.width;
  paddle.x=(e.touches[0].clientX-rect.left)*scaleX-paddle.w/2;
},{passive:false});
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  const scaleX=W/rect.width;
  paddle.x=(e.touches[0].clientX-rect.left)*scaleX-paddle.w/2;

  if(ball.stuck && running) releaseBall();
},{passive:false});

document.getElementById("launch-btn").addEventListener("touchstart",()=>{
  if(ball.stuck) releaseBall();
  else if(laserMode) fireLaser();
});

document.getElementById("sound-btn").addEventListener("click",()=>{
  soundEnabled=!soundEnabled;
  document.getElementById("sound-btn").textContent=soundEnabled?"🔊":"🔇";
});

draw();
</script>
</body>
</html>

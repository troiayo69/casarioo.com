<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Arkanoid Pro - 3 Niveles</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a1a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: system-ui, sans-serif;
  color: #fff;
  touch-action: none;
}
h1 { font-size: 24px; color: #60a5fa; margin-bottom: 8px; }
#hud { display: flex; gap: 24px; margin-bottom: 8px; font-size: 14px; font-weight: 500; color: #a0c4ff; }
#hud span { color: #fff; }
canvas { border: 2px solid #334; display: block; max-width: 100%; }
#msg { margin-top: 12px; font-size: 20px; font-weight: 500; color: #fff; min-height: 28px; text-align: center; }
#start-btn { margin-top: 10px; padding: 8px 28px; background: #2563eb; color: #fff; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
#start-btn:hover { background: #1d4ed8; }
</style>
</head>
<body>
<h1>Arkanoid Pro</h1>
<div id="hud">
  Puntos: <span id="score">0</span>
  &nbsp;&nbsp;Nivel: <span id="level">1</span>
  &nbsp;&nbsp;Vidas: <span id="lives">3</span>
</div>
<canvas id="c" width="420" height="480"></canvas>
<div id="msg">Pulsa INICIO para jugar</div>
<button id="start-btn">INICIO</button>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 420, H = 480;

const LEVELS = [
  { rows: 4, cols: 10, colors: ['#ef4444','#f97316','#eab308','#22c55e'] },
  { rows: 5, cols: 10, colors: ['#3b82f6','#8b5cf6','#ec4899','#06b6d4','#f59e0b'] },
  { rows: 6, cols: 10, colors: ['#e11d48','#7c3aed','#0369a1','#15803d','#b45309','#dc2626'] }
];

let bricks=[], ball={}, paddle={}, score=0, lives=3, level=0, running=false, raf=null;
const BW=36, BH=14, BPAD=2, BOFFX=9, BOFFY=40;
const PW=70, PH=10, PSPEED=6, BR=7;

function initLevel(lv) {
  const L = LEVELS[lv];
  bricks = [];
  for(let r=0;r<L.rows;r++) for(let c=0;c<L.cols;c++)
    bricks.push({ x: BOFFX + c*(BW+BPAD), y: BOFFY + r*(BH+BPAD), alive: true, color: L.colors[r % L.colors.length] });
  paddle = { x: W/2 - PW/2, y: H-30, w: PW, h: PH, dx: 0 };
  ball = { x: W/2, y: H-50, r: BR, dx: 3.5 + lv*0.4, dy: -(3.5 + lv*0.4) };
}

function draw() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0,0,W,H);
  bricks.forEach(b => {
    if(!b.alive) return;
    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.roundRect(b.x, b.y, BW, BH, 3);
    ctx.fill();
  });
  ctx.fillStyle = '#60a5fa';
  ctx.beginPath();
  ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 5);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
  ctx.fill();
}

function update() {
  ball.x += ball.dx; ball.y += ball.dy;
  if(ball.x - ball.r < 0) { ball.x = ball.r; ball.dx = Math.abs(ball.dx); }
  if(ball.x + ball.r > W) { ball.x = W - ball.r; ball.dx = -Math.abs(ball.dx); }
  if(ball.y - ball.r < 0) { ball.y = ball.r; ball.dy = Math.abs(ball.dy); }
  if(ball.x > paddle.x && ball.x < paddle.x+paddle.w && ball.y+ball.r >= paddle.y && ball.y+ball.r <= paddle.y+paddle.h+5 && ball.dy>0) {
    let hit = (ball.x - (paddle.x + paddle.w/2)) / (paddle.w/2);
    ball.dx = hit * 5; ball.dy = -Math.abs(ball.dy); ball.y = paddle.y - ball.r - 1;
  }
  if(ball.y - ball.r > H) {
    lives--;
    document.getElementById('lives').textContent = lives;
    if(lives <= 0) { endGame(false); return; }
    ball.x = W/2; ball.y = H-50;
    ball.dx = 3.5 + level*0.4; ball.dy = -(3.5 + level*0.4);
  }
  bricks.forEach(b => {
    if(!b.alive) return;
    if(ball.x+ball.r > b.x && ball.x-ball.r < b.x+BW && ball.y+ball.r > b.y && ball.y-ball.r < b.y+BH) {
      b.alive = false; score += 10*(level+1);
      document.getElementById('score').textContent = score;
      const fromLeft = ball.x < b.x, fromRight = ball.x > b.x+BW;
      if(fromLeft || fromRight) ball.dx *= -1; else ball.dy *= -1;
    }
  });
  paddle.x += paddle.dx;
  if(paddle.x < 0) paddle.x = 0;
  if(paddle.x + paddle.w > W) paddle.x = W - paddle.w;
  if(bricks.every(b => !b.alive)) {
    if(level < LEVELS.length-1) {
      level++; document.getElementById('level').textContent = level+1;
      initLevel(level);
      document.getElementById('msg').textContent = '¡Nivel ' + (level+1) + '!';
      setTimeout(() => { if(running) document.getElementById('msg').textContent = ''; }, 1500);
    } else { endGame(true); }
  }
}

function endGame(win) {
  running = false; cancelAnimationFrame(raf);
  document.getElementById('msg').textContent = win ? '¡¡GANASTE!! Puntos: ' + score : 'GAME OVER - Puntos: ' + score;
  document.getElementById('start-btn').textContent = 'REINICIAR';
  document.getElementById('start-btn').style.display = '';
}

function loop() { update(); draw(); if(running) raf = requestAnimationFrame(loop); }

document.getElementById('start-btn').addEventListener('click', () => {
  score=0; lives=3; level=0;
  document.getElementById('score').textContent = 0;
  document.getElementById('level').textContent = 1;
  document.getElementById('lives').textContent = 3;
  document.getElementById('msg').textContent = '';
  document.getElementById('start-btn').style.display = 'none';
  initLevel(0); running=true; raf=requestAnimationFrame(loop);
});

document.addEventListener('keydown', e => {
  if(e.key==='ArrowLeft') paddle.dx=-PSPEED;
  if(e.key==='ArrowRight') paddle.dx=PSPEED;
});
document.addEventListener('keyup', e => {
  if(e.key==='ArrowLeft'||e.key==='ArrowRight') paddle.dx=0;
});

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  paddle.x = (e.clientX - rect.left) * scaleX - paddle.w/2;
});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  paddle.x = (e.touches[0].clientX - rect.left) * scaleX - paddle.w/2;
}, { passive: false });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  paddle.x = (e.touches[0].clientX - rect.left) * scaleX - paddle.w/2;
}, { passive: false });

draw();
</script>
</body>
</html>
